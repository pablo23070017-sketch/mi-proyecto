<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tío Garnacha - Pedido Móvil</title>
    <style>
        body { background-color: #facc15; font-family: Arial, sans-serif; margin: 0; color: #000; }
        .barra-superior { background-color: #ea580c; padding: 10px; text-align: center; border-bottom: 3px solid #000; position: sticky; top: 0; z-index: 100; }
        .seccion-titulo { text-align: center; background-color: #000; color: #facc15; padding: 5px; margin: 15px 0 5px 0; text-transform: uppercase; }
        .caja-naranja { background-color: #ea580c; border: 2px solid #000; border-radius: 12px; margin: 10px; padding: 12px; box-shadow: 4px 4px 0px #000; }
        .boton-v { background-color: #16a34a; color: #000; border: 2px solid #000; border-radius: 8px; padding: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; font-size: 1rem; }
        
        /* Modales */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 200; }
        .modal-contenido { background-color: #facc15; border: 4px solid #ea580c; padding: 20px; width: 85%; border-radius: 15px; max-height: 90vh; overflow-y: auto; }
        select, input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 2px solid #000; border-radius: 5px; font-weight: bold; box-sizing: border-box; }
        .item-nota { background: #fff; padding: 10px; border: 2px solid #000; margin-bottom: 8px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="barra-superior">
    <b>Mesa: <input type="number" id="mesa_num" value="1" style="width: 45px;"></b> |
    <b>Persona: <span id="persona_label">1</span></b>
    <button class="boton-v" style="width: auto; padding: 5px 10px;" onclick="siguiente_persona()">+ Persona</button>
</div>

<h2 class="seccion-titulo">Antojitos</h2>
<div class="caja-naranja">
    <b>Panuchos / Salbuts / Garnachas</b>
    <button class="boton-v" onclick="abrir_config('Panucho', 'pollo:22,huevo:22,molida:22,asado:25', 'Lechuga,Repollo,Tomate,Cebolla')">Pedir Panucho</button>
    <button class="boton-v" onclick="abrir_config('Salbut', 'pollo:22,huevo:22,molida:22,asado:25', 'Lechuga,Repollo,Tomate,Cebolla')">Pedir Salbut</button>
    <button class="boton-v" onclick="abrir_config('Garnacha', 'huevo:22,pollo:22,molida:22,asado:25', 'Lechuga,Repollo,Frijol,Tomate,Cebolla Roja')">Pedir Garnacha</button>
</div>

<div class="caja-naranja">
    <b>Sopes / Tacos / Polcanes / Empanadas</b>
    <button class="boton-v" onclick="abrir_config('Sope', 'asado:28,pollo:28,molida:28,huevo:28', 'Frijol,Crema,Salsa Verde,Tomate Asado,Romanita,Cebolla Roja')">Pedir Sope ($28)</button>
    <button class="boton-v" onclick="abrir_config('Polcan', 'normal:12,pollo:20,asado:20,molida:20', 'Repollo,Cebolla,Tomate Frito,Tomate Asado,Cebolla Roja')">Pedir Polcan</button>
    <button class="boton-v" onclick="abrir_config('Taco', 'asado:25,pollo:25', 'Tortilla,Frijol,Repollo,Tomate Asado,Cebolla Roja')">Pedir Taco ($25)</button>
    <button class="boton-v" onclick="abrir_config('Empanada', 'molida:15,queso:15,pollo:15', 'Repollo,Cebolla,Tomate Frito')">Pedir Empanada ($15)</button>
</div>

<h2 class="seccion-titulo">Sopas y Tortas</h2>
<div class="caja-naranja">
    <button class="boton-v" onclick="abrir_config('Sopa Sencilla', 'entera:40,media:25', 'Repollo,Cebolla,Tomate Frito')">Sopa Sencilla</button>
    <button class="boton-v" onclick="abrir_config('Sopa Especial', 'entera:65,media:35', 'Pollo,Huevo,Repollo,Cebolla,Tomate Frito')">Sopa Especial</button>
    <button class="boton-v" onclick="abrir_config('Torta', 'ent. asado:70,ent. molida:70,ent. pollo:65,1/2 asado:40,1/2 molida:40,1/2 pollo:35', 'Frijol,Mayonesa,Repollo,Tomate Asado,Lechuga')">Pedir Torta</button>
</div>

<h2 class="seccion-titulo">Bebidas</h2>
<div class="caja-naranja">
    <b>Refrescos y Naturales</b>
    <button class="boton-v" onclick="abrir_bebida('Refresco', 25, 'Coca-Cola,Negra,Fresa,Fanta,Mundet,Del Valle', 'Vidrio,Desechable')">Configurar Refresco ($25)</button>
    <button class="boton-v" onclick="abrir_bebida('Natural', 20, 'Jamaica,Horchata', 'Vaso')">Agua Natural ($20)</button>
    <button class="boton-v" onclick="abrir_bebida('Desechable', 25, 'Fuze Tea,Agua 1L:22,Agua Chi:18', 'Bote')">Otras Bebidas</button>
</div>

<div style="padding: 15px;">
    <button class="boton-v" style="background-color: #000; color: #facc15;" onclick="ver_nota()">REVISAR NOTA Y CONFIRMAR</button>
</div>

<div id="modal_config" class="modal">
    <div class="modal-contenido">
        <h3 id="conf_nombre">Configurar</h3>
        <b>Tipo / Relleno:</b>
        <select id="conf_tipo"></select>
        <b>Cantidad:</b>
        <input type="number" id="conf_cant" value="1" min="1">
        <b>Sin ingredientes:</b>
        <div id="conf_ingredientes"></div>
        <b>Sugerencia:</b>
        <textarea id="conf_nota" placeholder="Ej. Bien tostado..."></textarea>
        <button class="boton-v" onclick="guardar_comida()">Agregar a Persona</button>
        <button onclick="cerrar_modal()" style="width: 100%; margin-top: 10px;">Cancelar</button>
    </div>
</div>

<div id="modal_bebida" class="modal">
    <div class="modal-contenido">
        <h3>Configurar Bebida</h3>
        <b>Sabor:</b>
        <select id="beb_sabor"></select>
        <b>Envase:</b>
        <select id="beb_envase"></select>
        <button class="boton-v" onclick="guardar_bebida()">Agregar Bebida</button>
        <button onclick="cerrar_modal_b()" style="width: 100%; margin-top: 10px;">Cancelar</button>
    </div>
</div>

<div id="modal_nota" class="modal">
    <div class="modal-contenido">
        <h2 style="text-align: center;">NOTA DE MESA</h2>
        <div id="contenido_nota" style="background: #fff; padding: 10px; border: 2px solid #000; max-height: 300px; overflow-y: auto;"></div>
        <br>
        <button class="boton-v" onclick="mandar_cocina()">ENVIAR A COCINA</button>
        <button onclick="cerrar_nota()" style="width: 100%; margin-top: 10px;">Cerrar</button>
    </div>
</div>

<script>
    var pedido_mesa = [];
    var persona_actual = 1;
    var prod_temp = "";
    var precio_bebida_temp = 25;

    function abrir_config(nombre, tipos, ings) {
        prod_temp = nombre;
        document.getElementById('conf_nombre').innerText = nombre;
        document.getElementById('conf_cant').value = 1;
        document.getElementById('conf_nota').value = "";
        var sel = document.getElementById('conf_tipo');
        sel.innerHTML = "";
        tipos.split(",").forEach(t => {
            var d = t.split(":");
            sel.innerHTML += `<option value="${d[1]}">${d[0].toUpperCase()} ($${d[1]})</option>`;
        });
        var div_i = document.getElementById('conf_ingredientes');
        div_i.innerHTML = "";
        ings.split(",").forEach(i => {
            div_i.innerHTML += `<label><input type="checkbox" class="ch_i" value="${i}"> Sin ${i}</label><br>`;
        });
        document.getElementById('modal_config').style.display = "flex";
    }

    function abrir_bebida(nombre, precio, sabores, envases) {
        prod_temp = nombre;
        precio_bebida_temp = precio;
        var s_sel = document.getElementById('beb_sabor');
        s_sel.innerHTML = "";
        sabores.split(",").forEach(s => {
            var d = s.split(":");
            var p = d[1] ? d[1] : precio;
            s_sel.innerHTML += `<option value="${p}">${d[0]}</option>`;
        });
        var e_sel = document.getElementById('beb_envase');
        e_sel.innerHTML = "";
        envases.split(",").forEach(e => {
            e_sel.innerHTML += `<option value="${e}">${e}</option>`;
        });
        document.getElementById('modal_bebida').style.display = "flex";
    }

    function guardar_comida() {
        var s = document.getElementById('conf_tipo');
        var q = [];
        document.querySelectorAll('.ch_i:checked').forEach(c => q.push(c.value));
        pedido_mesa.push({
            persona: persona_actual,
            nombre: prod_temp + " " + s.options[s.selectedIndex].text,
            precio: s.value,
            cant: parseInt(document.getElementById('conf_cant').value),
            nota: (q.length > 0 ? "Sin: "+q.join(",") : "") + " " + document.getElementById('conf_nota').value
        });
        cerrar_modal();
    }

    function guardar_bebida() {
        var s = document.getElementById('beb_sabor');
        var e = document.getElementById('beb_envase');
        pedido_mesa.push({
            persona: persona_actual,
            nombre: s.options[s.selectedIndex].text + " (" + e.value + ")",
            precio: s.value,
            cant: 1,
            nota: "Fría"
        });
        cerrar_modal_b();
    }

    function ver_nota() {
        var area = document.getElementById('contenido_nota');
        area.innerHTML = "";
        var total = 0;
        pedido_mesa.forEach((p, i) => {
            var sub = p.precio * p.cant;
            total += sub;
            area.innerHTML += `<div class="item-nota">
                <b>P${p.persona}:</b> ${p.cant}x ${p.nombre} ($${sub})
                <br><button onclick="cambiar_cant(${i}, 1)">+1</button> 
                <button onclick="quitar(${i})">Eliminar</button>
                <br><small>${p.nota}</small></div>`;
        });
        area.innerHTML += `<h3 style="text-align:right;">TOTAL: $${total}</h3>`;
        document.getElementById('modal_nota').style.display = "flex";
    }

    function cambiar_cant(index, val) {
        pedido_mesa[index].cant += val;
        ver_nota();
    }

    function quitar(index) {
        pedido_mesa.splice(index, 1);
        ver_nota();
    }

    function siguiente_persona() {
        persona_actual++;
        document.getElementById('persona_label').innerText = persona_actual;
    }

    function mandar_cocina() {
        if(pedido_mesa.length > 0) { alert("¡PEDIDO ENVIADO!"); location.reload(); }
    }

    function cerrar_modal() { document.getElementById('modal_config').style.display = "none"; }
    function cerrar_modal_b() { document.getElementById('modal_bebida').style.display = "none"; }
    function cerrar_nota() { document.getElementById('modal_nota').style.display = "none"; }
</script>
</body>
</html>
