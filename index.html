<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tío Garnacha - Login</title>
    <link rel="stylesheet" href="Style.css">
    <style>
        body {
            /* Ponemos el logo de fondo en toda la pantalla */
            background-image: url('imagenes/Log.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            /* Color de respaldo por si la imagen no carga */
            background-color: #facc15; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Ajuste para que la ventana resalte sobre el fondo */
        .login-container {
            background-color: rgba(250, 204, 21, 0.95); /* Amarillo con ligera transparencia */
            padding: 30px;
            border-radius: 15px;
            border: 4px solid #ea580c;
            box-shadow: 10px 10px 0px #000;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        .admin-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #000;
        }

        .btn-admin {
            background-color: #16a34a !important;
            color: #0e0e0d !important;
            margin-top: 8px;
            border: 2px solid #000;
            border-radius: 8px;
            padding: 10px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }

        h1, h2 {
            margin: 10px 0;
            color: #000;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #000;
            border-radius: 8px;
            box-sizing: border-box;
        }

        #loginBtn, #crearBtn {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border: 2px solid #000;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        #loginBtn { background-color: #16a34a; color: #000; }
        #crearBtn { background-color: #ea580c; color: #000; }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Tío Garnacha</h1>
        <h2>Inicio de Sesión</h2>

        <input type="text" placeholder="ID Usuario">
        <input type="text" placeholder="Nombre">
        <input type="email" placeholder="Correo Electrónico">
        <input type="password" placeholder="Contraseña">

        <button id="loginBtn">Iniciar Sesión</button>
        <button id="crearBtn">Crear cuenta (Mesero)</button>

        <div class="admin-section">
            <button id="loginAdminBtn" class="btn-admin">Entrar como Admin</button>
            <button id="crearAdminBtn" class="btn-admin">Registrar Admin</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
