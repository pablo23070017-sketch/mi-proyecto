<!DOCTYPE html>
<html lang="es">
<head>

    <title>Tío Garnacha - Login</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

    <div class="login-container">
        <h1>Tío Garnacha</h1>

    <script src="script.js"></script>
