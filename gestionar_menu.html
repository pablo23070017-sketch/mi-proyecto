<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestionar Menú - Tío Garnacha</title>
<style>
    body {
        font-family: 'Arial', sans-serif;
        /* REGLA: Fondo Amarillo solicitado */
        background-color: #facc15; 
        padding: 20px;
        margin: 0;
        /* REGLA: Letras negras global para buen contraste */
        color: #000000; 
    }

    h1.titulo {
        text-align: center;
        margin-bottom: 20px;
        font-weight: bold;
        text-transform: uppercase;
    }

    h2.seccion-titulo {
        margin-bottom: 15px;
        font-size: 1.8rem;
        text-align: center;
        text-decoration: underline;
    }

    /* REGLA: Botones Verdes (Acción/Éxito) */
    .boton-regresar {
        display: block;
        margin: 0 auto 30px auto;
        padding: 12px 25px;
        background-color: #16a34a; 
        color: #000000;
        border: 2px solid #000000;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        font-size: 1rem;
        transition: 0.3s;
    }

    .boton-regresar:hover {
        background-color: #15803d;
        transform: scale(1.05);
    }

    .contenedor-principal {
        display: flex;
        justify-content: center;
        gap: 40px;
        flex-wrap: wrap;
        align-items: flex-start;
    }

    .contenedor {
        display: flex;
        flex-direction: column;
        gap: 25px;
        align-items: center;
        min-width: 280px;
    }

    /* REGLA: Recuadros Anaranjados para los productos */
    .item {
        background-color: #ea580c; 
        border: 3px solid #000000;
        border-radius: 18px;
        padding: 20px;
        text-align: center;
        width: 240px;
        box-shadow: 5px 5px 0px #000000; /* Estilo visual limpio y marcado */
    }

    .item img {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-radius: 12px;
        border: 2px solid #000000;
        margin-bottom: 12px;
    }

    .item h3, .item p {
        /* REGLA: Letras negras sobre naranja */
        color: #000000; 
        margin: 5px 0;
        font-weight: bold;
    }

    /* REGLA: Botones Verdes dentro de los recuadros */
    .item button {
        margin-top: 10px;
        padding: 10px 15px;
        border: 2px solid #000000;
        border-radius: 10px;
        cursor: pointer;
        background-color: #16a34a;
        color: #000000;
        font-weight: bold;
        transition: 0.2s;
    }

    .item button.bloqueado {
        background-color: #9ca3af; /* Gris para estado inactivo */
        color: #000000;
    }

    .item button:hover {
        filter: brightness(1.1);
    }
</style>
</head>
<body>

<h1 class="titulo">Gestionar Menú - Tío Garnacha</h1>

<button class="boton-regresar" onclick="alert('Regresando...')">
    ← Regresar al Panel
</button>

<div class="contenedor-principal">

    <div class="contenedor">
        <h2 class="seccion-titulo">Comidas</h2>
        <div class="item">
            <img src="imagenes/panucho.jpg" alt="Panuchos">
            <h3>Panuchos</h3>
            <p>$35.00</p>
            <button onclick="toggleDisponibilidad(this)">Bloquear</button>
        </div>
        <div class="item">
            <img src="imagenes/salbute.jpg" alt="Salbutes">
            <h3>Salbutes</h3>
            <p>$35.00</p>
            <button onclick="toggleDisponibilidad(this)">Bloquear</button>
        </div>
    </div>

    <div class="contenedor">
        <h2 class="seccion-titulo">Bebidas</h2>
        <div class="item">
            <img src="imagenes/coca.jpg" alt="Coca-Cola">
            <h3>Coca-Cola</h3>
            <p>$18.00</p>
            <button onclick="toggleDisponibilidad(this)">Bloquear</button>
        </div>
        <div class="item">
            <img src="imagenes/jamaica.jpg" alt="Agua Natural">
            <h3>Jugo Natural</h3>
            <p>$15.00</p>
            <button onclick="toggleDisponibilidad(this)">Bloquear</button>
        </div>
    </div>

</div>

<script>
function toggleDisponibilidad(button) {
    if(button.classList.contains('bloqueado')) {
        button.classList.remove('bloqueado');
        button.style.backgroundColor = '#16a34a';
        button.textContent = 'Bloquear';
        button.parentElement.style.opacity = '1';
    } else {
        button.classList.add('bloqueado');
        button.style.backgroundColor = '#9ca3af'; 
        button.textContent = 'Desbloquear';
        button.parentElement.style.opacity = '0.6';
    }
}
</script>

</body>
</html>
