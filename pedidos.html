<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Pedidos - Tío Garnacha</title>
    <style>
        :root {
            --amarillo: #EBD34E;
            --naranja: #FF6666;
            --negro: #000000;
            --verde: #92e27a;
            --blanco: #ffffff;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--amarillo);
            margin: 0;
            padding: 0;
            color: var(--negro);
        }

        /* HEADER CON LOGO Y BOTÓN INTELIGENTE */
        header {
            width: 100%;
            background-color: var(--naranja);
            padding: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--negro);
        }

        .logo-header {
            width: 180px;
            height: 80px;

            background-color: #fff;
        }

        .header-titulo {
            text-align: center;
            flex-grow: 1;
        }

        /* TABLA ESTILO TÍO GARNACHA */
        h1 {
            text-align: center;
            text-transform: uppercase;
            margin: 25px 0;
        }

        .table-container {
            width: 95%;
            max-width: 1100px;
            margin: 0 auto 30px auto;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--blanco);
            border: 3px solid var(--negro);
            box-shadow: 10px 10px 0px var(--negro);
        }

        th {
            background-color: var(--naranja);
            color: var(--negro);
            padding: 15px;
            text-align: left;
            border-bottom: 4px solid var(--negro);
            border-right: 2px solid var(--negro);
            text-transform: uppercase;
        }

        td {
            padding: 12px;
            border: 2px solid var(--negro);
            font-weight: bold;
        }

        tr:nth-child(even) { background-color: #fff4e6; }
        tr:hover { background-color: var(--amarillo); }

        /* BOTÓN VERDE DE REGRESO */
        .back-btn {
            background-color: var(--verde);
            color: var(--negro);
            border: 3px solid var(--negro);
            padding: 10px 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-right: 20px;
        }
    </style>
</head>
<body>

    <header>
        <img src="imagenes/Log2.png" alt="Logo" class="logo-header">
        <div class="header-titulo">
            <div style="font-size: 1.2rem; font-weight: bold;">TÍO GARNACHA</div>
            <small id="rol-texto">HISTORIAL DE VENTAS</small>
        </div>
        <button class="back-btn" onclick="volverAlPanel()">REGRESAR</button>
    </header>

    <h1>Registro de Pedidos</h1>

    <div class="table-container">
        <table id="pedidosTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Mesero</th>
                    <th>Productos</th>
                    <th>Total</th>
                    <th>Hora</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script>
        // FUNCIÓN CLAVE: Detecta el rol y redirige al panel correcto
        function volverAlPanel() {
            const sesion = JSON.parse(localStorage.getItem("sesion"));
            
            if (sesion && (sesion.usuario === "admin" || sesion.usuario === "administrador")) {
                window.location.href = "admin.html"; // Panel del Admin
            } else {
                window.location.href = "panel.html"; // Panel del Mesero
            }
        }

        // Cargar los pedidos de la memoria
        let pedidos = JSON.parse(localStorage.getItem('pedidos_cocina')) || [];
        const tbody = document.querySelector("#pedidosTable tbody");

        if(pedidos.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:30px;">No hay pedidos registrados.</td></tr>`;
        } else {
            pedidos.forEach((pedido) => {
                const row = document.createElement("tr");
                const productosTexto = pedido.items.map(i => `${i.cant}x ${i.nombre}`).join(", ");
                
                let totalPedido = 0;
                pedido.items.forEach(i => totalPedido += (i.precio * i.cant));

                row.innerHTML = `
                    <td>${pedido.id.toString().slice(-5)}</td>
                    <td>${pedido.mesero}</td>
                    <td>${productosTexto}</td>
                    <td style="color: #16a34a;">$${totalPedido.toFixed(2)}</td>
                    <td>${pedido.hora}</td>
                    <td>${pedido.estado || 'Pendiente'}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // Mostrar quién está viendo la página en el header
        const sesionActual = JSON.parse(localStorage.getItem("sesion"));
        if (sesionActual) {
            document.getElementById("rol-texto").innerText = "PANEL: " + sesionActual.usuario.toUpperCase();
        }
    </script>
</body>
</html>
