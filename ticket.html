<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket de Venta - Tío Garnacha</title>
    <style>
        :root {
            --amarillo: #facc15;
            --naranja: #ea580c;
            --negro: #000000;
            --verde: #16a34a;
            --blanco: #ffffff;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--amarillo);
            margin: 0;
            padding: 0;
            color: var(--negro);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* HEADER COHERENTE CON TODO EL SISTEMA */
        header {
            width: 100%;
            background-color: var(--naranja);
            padding: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--negro);
        }

        .logo-header {
            width: 180px;
            height: 80px;

            background-color: #fff;
        }

        .header-titulo { text-align: center; flex-grow: 1; }

        .btn-regresar {
            background-color: var(--verde);
            color: var(--negro);
            border: 2px solid var(--negro);
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 20px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        /* DISEÑO DEL TICKET */
        .ticket-container {
            background: var(--blanco);
            padding: 30px;
            border: 3px dashed var(--negro); /* Estilo de recorte de ticket */
            width: 90%;
            max-width: 380px;
            margin: 40px auto;
            border-radius: 15px;
            box-shadow: 10px 10px 0px var(--negro);
            text-align: center;
        }

        .ticket-container h2 {
            margin-top: 0;
            color: var(--naranja);
            text-transform: uppercase;
            border-bottom: 2px solid var(--negro);
            padding-bottom: 10px;
        }

        pre {
            font-family: 'Courier New', Courier, monospace;
            text-align: left;
            white-space: pre-wrap;
            font-size: 14px;
            background: #f9f9f9;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        /* BOTÓN CERRAR SESIÓN (VERDE) */
        .btn-cerrar {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background-color: var(--verde);
            color: var(--negro);
            border: 2px solid var(--negro);
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-cerrar:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <header>
        <img src="imagenes/Log2.png" alt="Logo" class="logo-header">
        <div class="header-titulo">
            <div style="font-size: 1.2rem; font-weight: bold;">TÍO GARNACHA</div>
            <small>COMPROBANTE DE PAGO</small>
        </div>
        <button class="btn-regresar" onclick="volverAlPanel()">REGRESAR</button>
    </header>

    <div class="ticket-container">
        <h2>Ticket de Venta</h2>
        <pre id="contenidoTicket">Generando ticket...</pre>

        <button class="btn-cerrar" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>

    <script>
        // REDIRECCIÓN INTELIGENTE DEPENDIENDO DEL ROL
        function volverAlPanel() {
            const sesion = JSON.parse(localStorage.getItem("sesion"));
            if (sesion && (sesion.usuario === "admin" || sesion.usuario === "administrador")) {
                window.location.href = "admin.html";
            } else {
                window.location.href = "panel.html";
            }
        }

        function generarTicket() {
            // Traer datos desde localStorage (ajustado a tu lógica de pedidos_cocina)
            const mesa = localStorage.getItem("mesa_actual") || "1";
            const pedidos = JSON.parse(localStorage.getItem("pedidos_cocina") || "[]");
            const fecha = new Date().toLocaleDateString();
            const hora = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            let total = 0;
            let lineasPedidos = "";

            // Buscamos el último pedido realizado para esta mesa o mostramos el resumen general
            if (pedidos.length > 0) {
                const ultimoPedido = pedidos[pedidos.length - 1];
                ultimoPedido.items.forEach(p => {
                    let subtotal = p.precio * p.cant;
                    total += subtotal;
                    lineasPedidos += `${p.nombre.substring(0,15)} x${p.cant} ... $${subtotal}\n`;
                });
            }

            const ticketTexto = 
`DON EMILIANO - MOTUL YUCATÁN
-------------------------------
FECHA: ${fecha}
HORA:  ${hora}
MESA:  ${mesa}
-------------------------------
PRODUCTO          CANT   TOTAL
-------------------------------
${lineasPedidos}-------------------------------
TOTAL A PAGAR:      $${total.toFixed(2)}
-------------------------------
ESTADO: PEDIDO CONFIRMADO ✔
PAGO: EFECTIVO
-------------------------------
¡Gracias por su preferencia!
Vuelva pronto.`;

            document.getElementById("contenidoTicket").innerText = ticketTexto;
        }

        function cerrarSesion() {
            localStorage.removeItem("sesion"); // Solo borramos la sesión, no los pedidos
            window.location.href = "index.html";
        }

        // Generar ticket al cargar
        window.onload = generarTicket;
    </script>
</body>
</html>
