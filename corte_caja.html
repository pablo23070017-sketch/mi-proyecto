<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Corte de Caja - Tío Garnacha</title>
<style>
    body {
        font-family: 'Roboto', sans-serif;
        background-color: #fff7ed;
        padding: 20px;
    }
    h1 {
        color: #ea580c;
        text-align: center;
        margin-bottom: 20px;
    }
    .boton-regresar {
        display: block;
        margin: 0 auto 30px auto;
        padding: 10px 20px;
        background-color: #ea580c;
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        font-size: 1rem;
    }
    .boton-regresar:hover {
        background-color: #c2410c;
    }
    .form-corte {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 30px;
        flex-wrap: wrap;
    }
    .form-corte input[type="date"] {
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #ea580c;
    }
    .form-corte button {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        background-color: #059669;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }
    .form-corte button:hover {
        background-color: #047857;
    }
    .resumen {
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        border: 2px solid #ea580c;
        border-radius: 10px;
        background-color: #fff;
        padding: 20px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .resumen h2 {
        text-align: center;
        color: #ea580c;
        margin-bottom: 20px;
    }
    .resumen p {
        font-size: 1.1rem;
        margin: 8px 0;
        color: #000;
    }
</style>
</head>
<body>

<h1>Realizar Corte de Caja - Tío Garnacha</h1>

<!-- BOTÓN REGRESAR -->
<button class="boton-regresar" onclick="window.location.href='admin.html'">
    ← Regresar al Panel
</button>

<!-- FORMULARIO -->
<div class="form-corte">
    <label>
        Selecciona Fecha:
        <input type="date" id="fechaCorte">
    </label>
    <button onclick="realizarCorte()">Generar Corte</button>
</div>

<!-- RESUMEN -->
<div class="resumen" id="resumenCorte" style="display:none;">
    <h2>Resumen del Día</h2>
    <p id="totalVendido">Total Vendido: $0</p>
    <p id="cantidadPedidos">Cantidad de Pedidos: 0</p>
    <p id="tipoPagoEfectivo">Pagos en Efectivo: $0</p>
    <p id="tipoPagoTarjeta">Pagos con Tarjeta: $0</p>
</div>

<script>
function realizarCorte() {
    const fecha = document.getElementById('fechaCorte').value;
    if(!fecha) {
        alert('Selecciona una fecha');
        return;
    }

    // Datos simulados
    const cortes = {
        '2026-03-15': {total: 300, pedidos: 12, efectivo: 180, tarjeta: 120},
        '2026-03-16': {total: 450, pedidos: 20, efectivo: 250, tarjeta: 200},
        '2026-03-17': {total: 380, pedidos: 15, efectivo: 200, tarjeta: 180}
    };

    const corte = cortes[fecha];
    const resumen = document.getElementById('resumenCorte');

    if(!corte) {
        alert('No hay datos para esta fecha');
        resumen.style.display = 'none';
        return;
    }

    document.getElementById('totalVendido').textContent = 'Total Vendido: $' + corte.total;
    document.getElementById('cantidadPedidos').textContent = 'Cantidad de Pedidos: ' + corte.pedidos;
    document.getElementById('tipoPagoEfectivo').textContent = 'Pagos en Efectivo: $' + corte.efectivo;
    document.getElementById('tipoPagoTarjeta').textContent = 'Pagos con Tarjeta: $' + corte.tarjeta;

    resumen.style.display = 'block';
}
</script>

</body>
</html>
