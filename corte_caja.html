<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corte de Caja - Tío Garnacha</title>
    <style>
        :root {
            --amarillo: #EBD34E;
            --naranja: #FF6666;
            --negro: #000000;
            --verde: #92e27a;
            --blanco: #ffffff;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--amarillo);
            margin: 0;
            padding: 0;
            color: var(--negro);
        }

        /* HEADER COHERENTE CON TODO EL SISTEMA */
        header {
            width: 100%;
            background-color: var(--naranja);
            padding: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--negro);
        }

        .logo-header {
            width: 180px;
            height: 80px;
            background-color: #fff;
            margin-left: 20px;
        }

        .header-titulo { text-align: center; flex-grow: 1; }

        .btn-regresar {
            background-color: var(--verde);
            color: var(--negro);
            border: 2px solid var(--negro);
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        /* ESTILO BOTÓN DE AYUDA */
        .btn-ayuda {
            background-color: var(--blanco);
            border: 2px solid var(--negro);
            padding: 8px 12px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
            margin-right: 15px;
            font-size: 1rem;
        }

        h1 {
            text-align: center;
            text-transform: uppercase;
            margin: 30px 0;
            font-weight: 900;
        }

        /* FORMULARIO NARANJA */
        .contenedor-corte {
            background-color: var(--naranja);
            border: 3px solid var(--negro);
            border-radius: 15px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            margin: 0 auto 30px auto;
            box-shadow: 7px 7px 0px var(--negro);
            text-align: center;
        }

        input[type="date"] {
            padding: 12px;
            border: 2px solid var(--negro);
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            box-sizing: border-box;
        }

        .btn-generar {
            background-color: var(--verde);
            color: var(--negro);
            border: 2px solid var(--negro);
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 20px;
            width: 100%;
        }

        /* RESUMEN DEL DÍA */
        .resumen-caja {
            background-color: var(--naranja);
            border: 3px solid var(--negro);
            border-radius: 15px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            margin: 0 auto 50px auto;
            box-shadow: 10px 10px 0px var(--negro);
        }

        .resumen-caja h2 {
            text-align: center;
            background: var(--negro);
            color: var(--amarillo);
            padding: 8px;
            border-radius: 8px;
            margin-top: 0;
            text-transform: uppercase;
            font-size: 1.1rem;
        }

        .dato-corte {
            background: var(--blanco);
            border: 2px solid var(--negro);
            margin: 10px 0;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .monto-final {
            color: var(--verde);
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <header>
        <img src="imagenes/Log2.png" alt="Logo" class="logo-header">
        <div class="header-titulo">
            <div style="font-size: 1.2rem; font-weight: bold;">TÍO GARNACHA</div>
            <medium>GESTIÓN FINANCIERA</medium>
        </div>
        <div style="display: flex; align-items: center; margin-right: 20px;">
            <button class="btn-ayuda" onclick="abrirAyuda()">?</button>
            <button class="btn-regresar" onclick="volverAlPanel()">REGRESAR</button>
        </div>
    </header>

    <h1> Corte de Caja</h1>

    <div class="contenedor-corte">
        <label><b>SELECCIONA LA FECHA DE CIERRE:</b></label>
        <input type="date" id="fechaCorte">
        <button class="btn-generar" onclick="realizarCorte()">GENERAR RESUMEN</button>
    </div>

    <div class="resumen-caja" id="resumenCorte" style="display:none;">
        <h2>Resumen del Día</h2>
        
        <div class="dato-corte">
            <span>TOTAL VENDIDO:</span>
            <span class="monto-final" id="totalVendido">$0</span>
        </div>
        
        <div class="dato-corte">
            <span>CANTIDAD PEDIDOS:</span>
            <span id="cantidadPedidos">0</span>
        </div>

        <div class="dato-corte">
            <span>PAGOS EFECTIVO:</span>
            <span id="tipoPagoEfectivo" style="color:#16a34a;">$0</span>
        </div>

        <div class="dato-corte">
            <span>PAGOS TARJETA:</span>
            <span id="tipoPagoTarjeta" style="color:#1d4ed8;">$0</span>
        </div>
        
        <button class="btn-generar" style="background-color: var(--negro); color: var(--amarillo);" onclick="window.print()"> IMPRIMIR CORTE</button>
    </div>

    <script>
        // Función para mostrar ayuda sobre el corte de caja
        function abrirAyuda() {
            alert("AYUDA - CORTE DE CAJA: \n\n1. Selecciona la fecha de la que deseas obtener el cierre.\n2. Presiona 'GENERAR RESUMEN' para ver el total, pedidos y formas de pago.\n3. Puedes imprimir el resultado usando el botón 'IMPRIMIR CORTE' al final del resumen.");
        }

        // REDIRECCIÓN INTELIGENTE
        function volverAlPanel() {
            const sesion = JSON.parse(localStorage.getItem("sesion"));
            if (sesion && (sesion.usuario === "admin" || sesion.usuario === "administrador")) {
                window.location.href = "admin.html";
            } else {
                window.location.href = "panel.html";
            }
        }

        function realizarCorte() {
            const fecha = document.getElementById('fechaCorte').value;
            if(!fecha) {
                alert('Selecciona una fecha');
                return;
            }

            const cortes = {
                '2026-03-15': {total: 300, pedidos: 12, efectivo: 180, tarjeta: 120},
                '2026-03-16': {total: 450, pedidos: 20, efectivo: 250, tarjeta: 200},
                '2026-03-17': {total: 380, pedidos: 15, efectivo: 200, tarjeta: 180}
            };

            const corte = cortes[fecha];
            const resumen = document.getElementById('resumenCorte');

            if(!corte) {
                alert('No hay datos registrados para esta fecha en el sistema.');
                resumen.style.display = 'none';
                return;
            }

            document.getElementById('totalVendido').textContent = '$' + corte.total.toFixed(2);
            document.getElementById('cantidadPedidos').textContent = corte.pedidos;
            document.getElementById('tipoPagoEfectivo').textContent = '$' + corte.efectivo.toFixed(2);
            document.getElementById('tipoPagoTarjeta').textContent = '$' + corte.tarjeta.toFixed(2);

            resumen.style.display = 'block';
        }
    </script>
</body>
</html>
