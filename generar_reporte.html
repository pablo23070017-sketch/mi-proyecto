<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generar Reporte - Tío Garnacha</title>
<style>
    body {
        font-family: 'Roboto', sans-serif;
        background-color: #fff7ed; /* fondo similar al panel admin */
        padding: 20px;
    }
    h1 {
        color: #ea580c;
        text-align: center;
        margin-bottom: 20px;
    }
    .boton-regresar {
        display: block;
        margin: 0 auto 30px auto;
        padding: 10px 20px;
        background-color: #ea580c;
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        font-size: 1rem;
    }
    .boton-regresar:hover {
        background-color: #c2410c;
    }
    .form-reporte {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 30px;
        flex-wrap: wrap;
    }
    .form-reporte input[type="date"] {
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #ea580c;
    }
    .form-reporte button {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        background-color: #059669;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }
    .form-reporte button:hover {
        background-color: #047857;
    }
    table {
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
        border-collapse: collapse;
        text-align: center;
        background-color: #fff;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    th, td {
        padding: 12px;
        border: 1px solid #ea580c;
    }
    th {
        background-color: #ea580c;
        color: white;
    }
    td {
        color: #000;
    }
</style>
</head>
<body>

<h1>Generar Reporte - Tío Garnacha</h1>

<!-- BOTÓN REGRESAR -->
<button class="boton-regresar" onclick="window.location.href='admin.html'">
    ← Regresar al Panel
</button>

<!-- FORMULARIO -->
<div class="form-reporte">
    <label>
        Fecha inicio:
        <input type="date" id="fechaInicio">
    </label>
    <label>
        Fecha fin:
        <input type="date" id="fechaFin">
    </label>
    <button onclick="generarReporte()">Generar Reporte</button>
</div>

<!-- RESULTADOS -->
<table id="tablaReporte">
    <thead>
        <tr>
            <th>Fecha</th>
            <th>Pedido</th>
            <th>Total ($)</th>
            <th>Tipo de Pago</th>
        </tr>
    </thead>
    <tbody>
        <!-- Aquí se mostrarán los datos generados -->
    </tbody>
</table>

<script>
function generarReporte() {
    const tbody = document.querySelector('#tablaReporte tbody');
    tbody.innerHTML = ''; // limpiar tabla

    const inicio = document.getElementById('fechaInicio').value;
    const fin = document.getElementById('fechaFin').value;

    if(!inicio || !fin) {
        alert('Selecciona ambas fechas');
        return;
    }

    // Datos de ejemplo (simulación)
    const datos = [
        {fecha:'2026-03-15', pedido:'Tacos x2, Coca-Cola x2', total:76, pago:'Efectivo'},
        {fecha:'2026-03-16', pedido:'Hamburguesa x1, Agua de Jamaica x1', total:65, pago:'Tarjeta'},
        {fecha:'2026-03-17', pedido:'Quesadillas x3, Café x2', total:111, pago:'Efectivo'}
    ];

    // Filtrar por rango de fechas
    const reporte = datos.filter(d => d.fecha >= inicio && d.fecha <= fin);

    if(reporte.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4">No hay datos en este rango de fechas</td></tr>';
        return;
    }

    reporte.forEach(d => {
        const fila = document.createElement('tr');
        fila.innerHTML = `<td>${d.fecha}</td><td>${d.pedido}</td><td>${d.total}</td><td>${d.pago}</td>`;
        tbody.appendChild(fila);
    });
}
</script>

</body>
</html>
