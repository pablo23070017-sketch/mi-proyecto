<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador - Tío Garnacha</title>
    <style>
        :root {
            --amarillo: #facc15;
            --naranja: #ea580c;
            --negro: #000000;
            --verde: #16a34a;
        }

        /* RESET Y FONDO */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            background-color: var(--amarillo);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--negro);
        }

        /* HEADER COHERENTE */
        header {
            width: 100%;
            background-color: var(--naranja);
            padding: 10px 0;
            border-bottom: 4px solid var(--negro);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-header {
            width: 180px;
            height: 80px;

            background-color: #fff;
        }

        .titulo-centro {
            text-align: center;
        }

        .btn-salir {
            background-color: var(--verde);
            color: var(--negro);
            border: 2px solid var(--negro);
            padding: 8px 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        h1 {
            text-transform: uppercase;
            margin: 30px 0;
            font-size: 1.8rem;
            text-align: center;
        }

        /* PANEL DE TARJETAS NARANJAS */
        .panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 900px;
            margin-bottom: 40px;
        }

        .tarjeta-admin {
            background-color: var(--naranja);
            border: 3px solid var(--negro);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            text-decoration: none;
            color: var(--negro);
            font-weight: bold;
            box-shadow: 7px 7px 0px var(--negro);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .tarjeta-admin:active {
            transform: scale(0.95);
        }

        .icono {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .version {
            margin-top: auto;
            padding: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <img src="imagenes/Log2.png" alt="Logo" class="logo-header">

        <div class="titulo-centro">
            <h2 style="margin:0; font-size: 1.4rem;">TÍO GARNACHA</h2>
            <small>PANEL DE ADMINISTRACIÓN</small>
        </div>

        <button class="btn-salir" onclick="cerrarSesion()">Cerrar Sesión</button>
    </header>

    <h1>¿QUÉ DESEA REALIZAR?</h1>

    <div class="panel">
        <div class="tarjeta-admin" onclick="window.location.href='mesero.html'">
            <span class="icono">📝</span>
            <span>TOMAR PEDIDO</span>
        </div>

        <div class="tarjeta-admin" onclick="window.location.href='pedidos.html'">
            <span class="icono">📋</span>
            <span>VER PEDIDOS</span>
        </div>

        <div class="tarjeta-admin" onclick="window.location.href='gestionar_menu.html'">
            <span class="icono">🍔</span>
            <span>GESTIONAR MENÚ</span>
        </div>

        <div class="tarjeta-admin" onclick="window.location.href='generar_reporte.html'">
            <span class="icono">📊</span>
            <span>REPORTES</span>
        </div>

        <div class="tarjeta-admin" onclick="window.location.href='corte_caja.html'">
            <span class="icono">💰</span>
            <span>CORTE DE CAJA</span>
        </div>
    </div>

    <div class="version">v2.0 - Tío Garnacha System Admin</div>

    <script>
        function cerrarSesion() {
            // Limpiamos la sesión para seguridad
            localStorage.removeItem("sesion");
            window.location.href = "index.html";
        }
    </script>

</body>
</html>
