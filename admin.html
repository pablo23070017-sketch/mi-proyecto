<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrador - Tío Granacha</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* RESET Y FONDO */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #fff7ed;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            background-color: #ea580c;
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        header span {
            font-weight: normal;
            font-size: 0.9rem;
        }

        header button {
            background-color: #fff1e0;
            border: 2px solid #fff;
            color: #ea580c;
            padding: 6px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        header button:hover {
            background-color: white;
            color: #c2410c;
        }

        h1 {
            color: #ea580c;
            margin: 40px 0 30px 0;
            font-size: 2rem;
        }

        .panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
        }

        .panel button {
            background-color: #fff1e0;
            border: 2px solid #ea580c;
            color: #000;
            padding: 25px;
            font-size: 1.1rem;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 500;
        }

        .panel button:hover {
            background-color: #ea580c;
            color: white;
            transform: translateY(-5px);
        }

        /* Íconos tipo emoji */
        .panel button span {
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <header>
        Sistema Tío Granacha
        <div>
            <span>Administrador</span>
            <button onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </header>

    <h1>Panel de Administración</h1>

    <div class="panel">
        <button onclick="window.location.href='pedidos.html'">
            <span>📋</span> Ver Pedidos Realizados
        </button>

        <button onclick="window.location.href='gestionar_menu.html'">
            <span>🍔</span> Gestionar Menú
        </button>

        <button onclick="window.location.href='generar_reporte.html'">
            <span>📊</span> Generar Reporte
        </button>

        <button onclick="window.location.href='corte_caja.html'">
            <span>💰</span> Realizar Corte de Caja
        </button>
    </div>

    <script>
        function cerrarSesion() {
            // Limpiar cualquier sesión si quieres
            // localStorage.removeItem("adminLogin"); // opcional
            window.location.href = "index.html";
        }
    </script>

</body>
</html>
