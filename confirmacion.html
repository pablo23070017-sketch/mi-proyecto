<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos Realizados - Tío Garnacha</title>
    <style>
        body { background-color: #facc15; font-family: Arial, sans-serif; margin: 0; color: #000; }
        .header { background-color: #ea580c; padding: 15px; text-align: center; border-bottom: 4px solid #000; display: flex; justify-content: space-between; align-items: center; }
        
        .contenedor-lista { padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        /* TARJETA DE PEDIDO ENVIADO*/
        .tarjeta-enviada {
            background-color: #ea580c;
            border: 3px solid #000;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 5px 5px 0px #000;
        }

        .detalles { background: white; border: 2px solid #000; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 0.9rem; }
        
        .btn-regresar { background-color: #16a34a; color: #000; border: 2px solid #000; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

<div class="header">
    <a href="panel.html" class="btn-regresar">REGRESAR</a>
    <h2 style="margin:0;">PEDIDOS REALIZADOS</h2>
    <div style="width: 50px;"></div> </div>

<div id="lista_realizados" class="contenedor-lista">
    </div>

<script>
    function cargarHistorial() {
        const contenedor = document.getElementById('lista_realizados');
        const pedidos = JSON.parse(localStorage.getItem("pedidos_cocina")) || [];

        if (pedidos.length === 0) {
            contenedor.innerHTML = "<h3 style='text-align:center;'>No has enviado pedidos aún.</h3>";
            return;
        }

        contenedor.innerHTML = ""; // Limpiar antes de cargar

        pedidos.forEach(p => {
            let itemsTexto = p.items.map(i => `${i.cant}x ${i.nombre}`).join('<br>');
            
            contenedor.innerHTML += `
                <div class="tarjeta-enviada">
                    <div style="display:flex; justify-content:space-between; font-weight:bold;">
                        <span>MESA: ${p.mesa}</span>
                        <span>🕒 ${p.hora}</span>
                    </div>
                    <div class="detalles">
                        ${itemsTexto}
                        <hr style="border:1px solid #000;">
                        <small>Atendió: ${p.mesero}</small>
                    </div>
                </div>
            `;
        });
    }

    // Cargar al iniciar
    cargarHistorial();
</script>
</body>
</html>
