<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Principal - Tío Garnacha</title>
    <style>
        body { 
            background-color: #EBD34E; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            color: #000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; /* Para asegurar que el contenido ocupe la pantalla */
        }
        
        .header { 
            background-color: #FFA832; 
            width: 100%; 
            padding: 10px 0; 
            border-bottom: 4px solid #000; 
            display: flex;
            justify-content: space-between; 
            align-items: center;
        }

        .logo-header {
            width: 180px;
            height: 80px;
            background-color: #fff;
            margin-left: 20px;
        }
        
        .contenedor-botones { 
            padding: 20px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            max-width: 500px; 
            width: 90%; 
            margin-top: 20px;
        }

        .tarjeta-opcion {
            background-color: #FF6666; 
            border: 3px solid #000;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            box-shadow: 6px 6px 0px #000;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .tarjeta-opcion:active { transform: scale(0.95); }

        .icono { font-size: 40px; margin-bottom: 10px; }

        .btn-salir {
            background-color: #92e27a; 
            border: 2px solid #000;
            padding: 8px 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* ESTILO BOTÓN DE AYUDA */
        .btn-ayuda {
            background-color: #fff;
            border: 2px solid #000;
            padding: 8px 12px;
            border-radius: 50%; /* Circular */
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
            font-size: 0.9rem;
        }

        /* CONTENEDOR INFO INFERIOR IZQUIERDA */
        .info-local {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: #FFA832;
            border: 3px solid #000;
            padding: 15px;
            border-radius: 12px;
            font-size: 0.8rem;
            box-shadow: 5px 5px 0px #000;
            text-align: left;
            line-height: 1.4;
        }

        /* Pequeña etiqueta para el atajo de teclado */
        .tecla-atajo {
            margin-top: 10px;
            background: #000;
            color: #fff;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

<div class="header">
    <img src="imagenes/Log2.png" alt="Logo" class="logo-header">

    <div style="text-align: center;">
        <h1 style="margin:0; font-size: 1.5rem;">TÍO GARNACHA</h1>
        <medium>Control de Ventas</medium>
    </div>

    <div style="display: flex; align-items: center; margin-right: 20px;">
        <button class="btn-ayuda" id="btnAyuda" onclick="mostrarAyuda()">?</button>
        <button class="btn-salir" onclick="window.location.href='index.html'">CERRAR SESIÓN</button>
    </div>
</div>

<h2 style="margin-top:30px; text-transform: uppercase; text-align: center;">¿Qué deseas realizar?</h2>

<div class="contenedor-botones">
    <a href="Mesero.html" class="tarjeta-opcion" id="btnTomarPedido">
        <div class="icono">📝</div>
        <span>TOMAR PEDIDO</span>
        <span class="tecla-atajo">F1</span>
    </a>

    <a href="pedidos.html" class="tarjeta-opcion" id="btnVerPedidos">
        <div class="icono">📋</div>
        <span>VER PEDIDOS</span>
        <span class="tecla-atajo">F2</span>
    </a>
</div>

<div class="info-local">
    <strong>Visítanos:</strong><br>
    Calle 26A, COLONIA CENTRO, <br>
    Cancha de bazar, Motul, Yucatán <br><br>
    <strong>Realiza tu pedido:</strong><br>
    9911101664
</div>

<p style="margin-top: 60px; font-size: 12px; text-align: center;">v1.2 - Primera version</p>

<script>
    function mostrarAyuda() {
        alert('Guía rápida: \n1. [F1] TOMAR PEDIDO para iniciar una venta. \n2. [F2] VER PEDIDOS para revisar el historial. \n3. [ESC] Cerrar sesión.');
    }

    // Lógica para detectar las teclas F1, F2, ?, y ESC
    document.addEventListener('keydown', function(event) {
        // Evitar que F1 abra la ayuda del navegador
        if (event.key === "F1" || event.key === "F2") {
            event.preventDefault();
        }

        switch(event.key) {
            case "F1":
                window.location.href = 'Mesero.html';
                break;
            case "F2":
                window.location.href = 'pedidos.html';
                break;
            case "Escape":
                window.location.href = 'index.html';
                break;
            case "?":
                mostrarAyuda();
                break;
        }
    });
</script>

</body>
</html>
