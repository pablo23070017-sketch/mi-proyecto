<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Pedidos - Tío Garnacha</title>
    <style>
        :root {
            --amarillo: #EBD34E;
            --naranja: #FF6666;
            --negro: #000000;
            --verde: #92e27a;
            --blanco: #ffffff;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--amarillo);
            margin: 0;
            padding: 0;
            color: var(--negro);
        }

        header {
            width: 100%;
            background-color: var(--naranja);
            padding: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--negro);
        }

        .logo-header {
            width: 180px;
            height: 80px;
            background-color: #fff;
            margin-left: 20px;
        }

        .header-titulo {
            text-align: center;
            flex-grow: 1;
        }

        h1 {
            text-align: center;
            text-transform: uppercase;
            margin: 25px 0;
        }

        .table-container {
            width: 95%;
            max-width: 1100px;
            margin: 0 auto 30px auto;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--blanco);
            border: 3px solid var(--negro);
            box-shadow: 10px 10px 0px var(--negro);
        }

        th {
            background-color: var(--naranja);
            color: var(--negro);
            padding: 15px;
            text-align: left;
            border-bottom: 4px solid var(--negro);
            border-right: 2px solid var(--negro);
            text-transform: uppercase;
        }

        td {
            padding: 12px;
            border: 2px solid var(--negro);
            font-weight: bold;
        }

        tr:nth-child(even) { background-color: #fff4e6; }
        tr:hover { background-color: var(--amarillo); }

        .back-btn {
            background-color: var(--verde);
            color: var(--negro);
            border: 3px solid var(--negro);
            padding: 10px 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-ayuda {
            background-color: var(--blanco);
            border: 2px solid var(--negro);
            padding: 8px 12px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
            margin-right: 15px;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <header>
        <img src="imagenes/Log2.png" alt="Logo" class="logo-header">
        <div class="header-titulo">
            <div style="font-size: 1.2rem; font-weight: bold;">TÍO GARNACHA</div>
            <small id="rol-texto">HISTORIAL DE VENTAS</small>
        </div>
        <div style="display: flex; align-items: center; margin-right: 20px;">
            <button class="btn-ayuda" onclick="abrirAyuda()">?</button>
            <button class="back-btn" onclick="volverAlPanel()">REGRESAR</button>
        </div>
    </header>

    <h1>Registro de Pedidos</h1>

    <div class="table-container">
        <table id="pedidosTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Mesero</th>
                    <th>Productos</th>
                    <th>Total</th>
                    <th>Hora</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script>
        function abrirAyuda() {
            alert("AYUDA - HISTORIAL DE PEDIDOS:\n\n1. Aquí puedes ver todas las órdenes enviadas a cocina.\n2. El 'Total' se calcula automáticamente sumando los productos.\n3. Puedes verificar qué mesero tomó cada orden y a qué hora.");
        }

        function volverAlPanel() {
            const sesion = JSON.parse(localStorage.getItem("sesion"));
            if (sesion && sesion.rol === "admin") {
                window.location.href = "admin.html";
            } else {
                window.location.href = "Mesero.html";
            }
        }

        // Cargar datos desde MySQL
        async function cargarPedidosDB() {
            const tbody = document.querySelector("#pedidosTable tbody");
            try {
                const res = await fetch('http://192.168.1.70:3000/pedidos');
                const pedidos = await res.json();

                tbody.innerHTML = ""; 

                if(pedidos.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:30px;">No hay pedidos registrados.</td></tr>`;
                    return;
                }

                pedidos.forEach((p) => {
                    const row = document.createElement("tr");
                    
                    // Aseguramos que el total sea un número para poder usar toFixed
                    const totalVenta = parseFloat(p.total_cuenta) || 0;

                    row.innerHTML = `
                        <td>${p.id_pedido}</td>
                        <td>${p.nombre_mesero || 'SISTEMA'}</td>
                        <td>${p.productos || 'Sin productos'}</td>
                        <td style="color: #16a34a;">$${totalVenta.toFixed(2)}</td>
                        <td>${new Date(p.fecha).toLocaleString()}</td>
                        <td style="color: ${p.estado === 'pendiente' ? 'red' : 'green'};">${p.estado.toUpperCase()}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error(error);
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:red;">Error al procesar los datos del servidor.</td></tr>`;
            }
        }

        // Iniciar carga
        cargarPedidosDB();

        const sesionActual = JSON.parse(localStorage.getItem("sesion"));
        if (sesionActual) {
            const nombreMostrar = sesionActual.nombre || sesionActual.usuario || "USUARIO";
            document.getElementById("rol-texto").innerText = "PANEL: " + nombreMostrar.toUpperCase();
        }
    </script>
</body>
</html>
