<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tío Garnacha - Cocina</title>
    <style>
        :root {
            --amarillo: #EBD34E;
            --naranja: #FF6666; 
            --negro: #000000;   
            --verde: #92e27a;   
            --blanco: #ffffff;
        }

        body { 
            background-color: var(--amarillo); 
            font-family: 'Arial Black', sans-serif; 
            margin: 0; 
            padding: 20px;
        }

        .header-cocina {
            background: var(--negro);
            color: var(--amarillo);
            padding: 15px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 4px solid var(--naranja);
        }

        .contenedor-pedidos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .ticket {
            background: var(--blanco);
            border: 3px solid var(--negro);
            border-radius: 10px;
            box-shadow: 8px 8px 0px var(--negro);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        /* ESTILO PARA PEDIDO COMPLETADO */
        .ticket.completado {
            background: #d4edda !important;
            opacity: 0.8;
            transform: scale(0.95);
            box-shadow: 4px 4px 0px var(--negro);
        }

        .ticket.completado .item-pedido {
            text-decoration: line-through;
            color: #666;
        }

        .ticket-header {
            background: var(--naranja);
            color: white;
            padding: 10px;
            border-bottom: 3px solid var(--negro);
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
        }

        .ticket-body {
            padding: 15px;
            flex-grow: 1;
        }

        .item-pedido {
            border-bottom: 1px dashed #ccc;
            padding: 8px 0;
            font-size: 1.1rem;
            color: #333;
        }

        .nota-especial {
            color: #d32f2f;
            font-size: 0.9rem;
            font-style: italic;
            margin-top: 4px;
            background: #fff0f0;
            padding: 3px;
        }

        .btn-entregado {
            background: var(--verde);
            color: var(--negro);
            border: none;
            border-top: 3px solid var(--negro);
            padding: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-entregado:disabled {
            background: #ccc;
            cursor: default;
        }

        .btn-entregado:hover:not(:disabled) { background: #7ed363; }

        .vacio { text-align: center; grid-column: 1/-1; font-size: 1.5rem; color: rgba(0,0,0,0.5); margin-top: 50px; }
        #status { font-family: sans-serif; font-size: 0.8rem; color: #ff6666; }
    </style>
</head>
<body>

<div class="header-cocina">
    <h1>👨‍🍳 PANEL DE COCINA</h1>
    <div id="status">Buscando servidor...</div>
</div>

<div class="contenedor-pedidos" id="lista_pedidos">
    <div class="vacio">Cargando pedidos pendientes... 🌮</div>
</div>

<script>
    const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
        ? '' 
        : 'http://192.168.1.70:3000';

    async function cargarPedidos() {
        try {
            const res = await fetch(`${API_BASE}/pedidos-pendientes`);
            if (!res.ok) throw new Error("No se pudo obtener datos");
            
            const pedidos = await res.json();
            const contenedor = document.getElementById('lista_pedidos');
            const status = document.getElementById('status');
            
            status.innerText = "🟢 EN LÍNEA - Última actualización: " + new Date().toLocaleTimeString();
            status.style.color = "#92e27a";
            
            // Solo limpiamos si hay cambios reales para evitar parpadeos molestos
            const ticketsActivos = document.querySelectorAll('.ticket:not(.completado)');
            if (pedidos.length === 0 && ticketsActivos.length === 0) {
                contenedor.innerHTML = '<div class="vacio">¡Todo al día! No hay pedidos pendientes. 😴</div>';
                return;
            }

            // Si hay pedidos, actualizamos la lista (pero mantenemos los que acabamos de marcar como completados)
            const completadosIds = Array.from(document.querySelectorAll('.ticket.completado')).map(t => t.id.replace('ticket-', ''));
            
            let htmlFinal = "";
            pedidos.forEach(p => {
                // Si el pedido ya está marcado como completado visualmente, no lo redibujamos como pendiente
                if (completadosIds.includes(p.id_pedido.toString())) return;

                let itemsHTML = "";
                p.detalles.forEach(item => {
                    itemsHTML += `
                        <div class="item-pedido">
                            <b>${item.cantidad}x</b> ${item.nombre_producto}
                            ${item.nota ? `<div class="nota-especial">📝 ${item.nota}</div>` : ''}
                        </div>`;
                });

                htmlFinal += `
                    <div class="ticket" id="ticket-${p.id_pedido}">
                        <div class="ticket-header">
                            <span>MESA ${p.mesa}</span>
                            <span>#${p.id_pedido}</span>
                        </div>
                        <div class="ticket-body">
                            ${itemsHTML}
                            <p style="font-size: 0.8rem; margin-top: 10px; color: gray;">Hora: ${new Date(p.fecha).toLocaleTimeString()}</p>
                        </div>
                        <button class="btn-entregado" id="btn-${p.id_pedido}" onclick="marcarEntregado(${p.id_pedido})">✅ LISTO</button>
                    </div>
                `;
            });

            // Insertar los tickets nuevos sin borrar los que están en proceso de desaparecer (completados)
            const temporales = document.querySelectorAll('.ticket.completado');
            contenedor.innerHTML = htmlFinal;
            temporales.forEach(t => contenedor.appendChild(t));

        } catch (error) {
            console.error(error);
            document.getElementById('status').innerText = "🔴 ERROR DE CONEXIÓN CON EL SERVIDOR";
            document.getElementById('status').style.color = "#ff6666";
        }
    }

    async function marcarEntregado(id) {
        const ticket = document.getElementById(`ticket-${id}`);
        const boton = document.getElementById(`btn-${id}`);

        try {
            // Cambio importante: usamos la nueva ruta GET definida en app.js
            const res = await fetch(`${API_BASE}/pedidos-entregar/${id}`);
            if (res.ok) {
                ticket.classList.add('completado');
                boton.innerText = "ENTREGADO";
                boton.disabled = true;
            } else {
                alert("No se pudo actualizar el pedido.");
            }
        } catch (error) {
            alert("Error al conectar con el servidor.");
        }
    }

    cargarPedidos();
    setInterval(cargarPedidos, 10000);
</script>

</body>
</html>
